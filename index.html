<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluctuations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'bipolar-rocket': '#f43f5e', // Rose 500
              'bipolar-ferris': '#fbbf24', // Amber 400
              'bipolar-steady': '#a8a29e', // Stone 400
              'bipolar-breath': '#2dd4bf', // Teal 400
              'bipolar-sea': '#3b82f6', // Blue 500
              'bipolar-abyss': '#1e293b', // Slate 800
              'paper': '#fafaf9', // Stone 50
              'ink': '#44403c', // Stone 700
            },
            fontFamily: {
              sans: ['Helvetica Neue', 'Arial', 'sans-serif'],
            },
            animation: {
              'breathe-fast': 'breathe 1.5s ease-in-out infinite',
              'breathe-normal': 'breathe 4s ease-in-out infinite',
              'breathe-slow': 'breathe 6s ease-in-out infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              breathe: {
                '0%, 100%': { transform: 'scale(1)', opacity: '0.9' },
                '50%': { transform: 'scale(1.05)', opacity: '1' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #fafaf9;
        color: #44403c;
      }
      /* Hide scrollbar for clean UI */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
    </style>

  }
}
</script>
